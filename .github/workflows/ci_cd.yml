name: CI-CD Churn Project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MLFLOW_ALLOW_FILE_STORE: "true"

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r 06_MLOps/requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short
        env:
          PYTHONPATH: 03_SRC

  # ── 2. Entraînement ────────────────────────────────────────────────────────
  train:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r 06_MLOps/requirements.txt

      - name: Train model
        run: python 03_SRC/models/train_model.py
        env:
          PYTHONPATH: 03_SRC

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: best_model
          path: 04_Models/best_model.pkl

  # ── 3. Build Docker ────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: best_model
          path: 04_Models/

      - name: Build Docker image
        run: docker build -f 06_MLOps/Dockerfile -t churn-api:latest .
